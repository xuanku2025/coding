<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI 截图对比工具 - 智能版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg-dark: #0F172A;
      --bg-card: #1E293B;
      --border: #334155;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    input, select, textarea {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    .btn {
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: #EF4444; }
    .btn-danger:hover { background: #DC2626; }
    .btn-success { background: #10B981; }
    .btn-success:hover { background: #059669; }
    .tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
    .tag-color { background: #FEF3C7; color: #92400E; }
    .tag-font { background: #DBEAFE; color: #1E40AF; }
    .tag-spacing { background: #D1FAE5; color: #065F46; }
    .tag-size { background: #E0E7FF; color: #3730A3; }
    .tag-other { background: #F3F4F6; color: #374151; }
    .tag-auto { background: #FCE7F3; color: #9D174D; }
    .marker {
      position: absolute;
      width: 28px;
      height: 28px;
      background: #EF4444;
      border: 2px solid white;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: white;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
      z-index: 20;
      transition: transform 0.2s;
    }
    .marker.auto-detected {
      background: #EC4899;
    }
    .marker:hover { transform: translate(-50%, -50%) scale(1.2); }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-zone:hover { border-color: var(--primary); background: rgba(79, 70, 229, 0.1); }
    .upload-zone.dragover { border-color: var(--primary); background: rgba(79, 70, 229, 0.15); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.3s ease; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .diff-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .diff-overlay img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .compare-slider {
      position: relative;
      width: 100%;
      height: 500px;
      overflow: hidden;
      border-radius: 12px;
      background: var(--bg-card);
    }
    .compare-slider .image-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .compare-slider .image-layer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .compare-slider .left {
      z-index: 2;
    }
    .compare-slider .right {
      clip-path: inset(0 0 0 50%);
    }
    .compare-slider .handle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 4px;
      background: var(--primary);
      cursor: ew-resize;
      z-index: 10;
      transform: translateX(-50%);
    }
    .compare-slider .handle::after {
      content: '⟷';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.4);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ============ 组件 ============

    function Header() {
      return (
        <header className="flex items-center justify-between px-6 py-4 border-b border-slate-700 bg-slate-900/50">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M9 3v18M21 9H3"/>
              </svg>
            </div>
            <h1 className="text-xl font-semibold">UI 截图对比工具</h1>
          </div>
          <div className="text-sm text-slate-400">
            上传截图 → 智能对比 → 自动标注 → 导出报告
          </div>
        </header>
      );
    }

    function UploadSection({ onUpload }) {
      const [designFile, setDesignFile] = useState(null);
      const [pageFile, setPageFile] = useState(null);
      const [dragOver, setDragOver] = useState(null);
      const designInputRef = useRef(null);
      const pageInputRef = useRef(null);

      const handleFile = (file, type) => {
        if (!file || !file.type.startsWith('image/')) {
          alert('请上传图片文件 (PNG/JPG)');
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = e.target.result;
          if (type === 'design') {
            setDesignFile({ name: file.name, data });
            onUpload('design', data);
          } else {
            setPageFile({ name: file.name, data });
            onUpload('page', data);
          }
        };
        reader.readAsDataURL(file);
      };

      const UploadZone = ({ type, file, label, icon }) => (
        <div
          className={`upload-zone ${dragOver === type ? 'dragover' : ''}`}
          onClick={() => type === 'design' ? designInputRef.current?.click() : pageInputRef.current?.click()}
          onDrop={(e) => { e.preventDefault(); setDragOver(null); handleFile(e.dataTransfer.files[0], type); }}
          onDragOver={(e) => { e.preventDefault(); setDragOver(type); }}
          onDragLeave={() => setDragOver(null)}
        >
          <input
            ref={type === 'design' ? designInputRef : pageInputRef}
            type="file"
            accept="image/*"
            className="hidden"
            onChange={(e) => handleFile(e.target.files[0], type)}
          />
          {file ? (
            <div className="flex items-center gap-3">
              <img src={file.data} alt={label} className="w-20 h-20 object-contain rounded-lg border border-slate-600" />
              <div className="text-left">
                <p className="font-medium text-indigo-400">{label}</p>
                <p className="text-sm text-slate-400 truncate max-w-[200px]">{file.name}</p>
              </div>
            </div>
          ) : (
            <>
              <div className="text-3xl mb-2">{icon}</div>
              <p className="text-slate-300 font-medium">{label}</p>
              <p className="text-sm text-slate-500 mt-1">点击或拖拽上传</p>
            </>
          )}
        </div>
      );

      return (
        <div className="grid grid-cols-2 gap-6 mb-6">
          <div>
            <h3 className="text-sm font-medium text-slate-400 mb-2">📐 设计稿截图</h3>
            <UploadZone type="design" file={designFile} label="设计稿" icon="📐" />
          </div>
          <div>
            <h3 className="text-sm font-medium text-slate-400 mb-2">🖥️ 页面截图</h3>
            <UploadZone type="page" file={pageFile} label="实装页面" icon="🖥️" />
          </div>
        </div>
      );
    }

    function CompareSlider({ designImage, pageImage, onClick }) {
      const [sliderPos, setSliderPos] = useState(50);
      const containerRef = useRef(null);
      const [isDragging, setIsDragging] = useState(false);

      useEffect(() => {
        if (!isDragging) return;
        const handleMove = (e) => {
          if (!containerRef.current) return;
          const rect = containerRef.current.getBoundingClientRect();
          const x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
          setSliderPos(x);
        };
        const handleUp = () => setIsDragging(false);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleUp);
        return () => {
          window.removeEventListener('mousemove', handleMove);
          window.removeEventListener('mouseup', handleUp);
        };
      }, [isDragging]);

      if (!designImage && !pageImage) {
        return (
          <div className="compare-slider flex items-center justify-center text-slate-500">
            <div className="text-center">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="mx-auto mb-4">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M9 3v18M21 9H3"/>
              </svg>
              <p>上传两张截图后开始对比</p>
            </div>
          </div>
        );
      }

      const hasBoth = designImage && pageImage;

      return (
        <div ref={containerRef} className="compare-slider" onMouseDown={(e) => setIsDragging(true)} onClick={onClick}>
          <div className="image-layer left">
            <img src={designImage || pageImage} alt="设计稿" />
            {designImage && <span className="absolute top-3 left-3 bg-indigo-500 text-white text-xs px-3 py-1 rounded">设计稿</span>}
          </div>
          {hasBoth && (
            <div className="image-layer right" style={{ clipPath: `inset(0 ${100 - sliderPos}% 0 0)` }}>
              <img src={pageImage} alt="页面" />
              <span className="absolute top-3 right-3 bg-emerald-500 text-white text-xs px-3 py-1 rounded">实装页面</span>
            </div>
          )}
          {hasBoth && (
            <div className="handle" style={{ left: sliderPos + '%' }} />
          )}
        </div>
      );
    }

    function CompareOverlay({ designImage, pageImage, onClick }) {
      if (!designImage && !pageImage) {
        return (
          <div className="compare-slider flex items-center justify-center text-slate-500">
            <p>上传截图后显示叠加对比</p>
          </div>
        );
      }

      const base = designImage || pageImage;
      const overlay = pageImage || designImage;

      return (
        <div className="compare-slider relative" onClick={onClick}>
          <div className="absolute inset-0 flex items-center justify-center bg-slate-800">
            <img src={base} alt="底层" className="max-w-full max-h-full object-contain" />
          </div>
          {overlay && overlay !== base && (
            <div className="absolute inset-0 flex items-center justify-center" style={{ mixBlendMode: 'difference', opacity: 0.8 }}>
              <img src={overlay} alt="叠加" className="max-w-full max-h-full object-contain" />
            </div>
          )}
          <span className="absolute top-3 left-3 bg-indigo-500 text-white text-xs px-3 py-1 rounded">叠加对比 (difference 模式)</span>
        </div>
      );
    }

    function CompareDiff({ designImage, pageImage, diffData, markers, onClick }) {
      return (
        <div className="compare-slider relative" onClick={onClick}>
          {diffData ? (
            <>
              <div className="absolute inset-0 flex items-center justify-center bg-slate-800">
                <img src={diffData} alt="差异图" className="max-w-full max-h-full object-contain" />
              </div>
              <span className="absolute top-3 left-3 bg-red-500 text-white text-xs px-3 py-1 rounded">差异高亮 (红色为差异区域)</span>
            </>
          ) : (
            <div className="absolute inset-0 flex items-center justify-center bg-slate-800">
              <img src={designImage || pageImage} alt="原图" className="max-w-full max-h-full object-contain" />
            </div>
          )}
          {markers.map((m, idx) => (
            <div
              key={idx}
              className={`marker ${m.isAuto ? 'auto-detected' : ''}`}
              style={{ left: m.x + '%', top: m.y + '%' }}
            >
              {idx + 1}
            </div>
          ))}
        </div>
      );
    }

    function AnalyzeModal({ progress, status }) {
      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50">
          <div className="bg-slate-800 rounded-xl p-8 w-[360px] border border-slate-700 animate-fadeIn">
            <div className="text-center">
              <div className="w-16 h-16 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <div className="spinner text-indigo-400" style={{ width: 32, height: 32 }}></div>
              </div>
              <h3 className="text-lg font-semibold mb-2">智能分析中</h3>
              <p className="text-slate-400 mb-4 text-sm">{status}</p>
              <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                <div className="h-full bg-indigo-500 transition-all duration-300" style={{ width: progress + '%' }} />
              </div>
              <p className="text-xs text-slate-500 mt-2">{progress.toFixed(0)}%</p>
            </div>
          </div>
        </div>
      );
    }

    function MarkerModal({ marker, onSave, onClose }) {
      const [type, setType] = useState(marker?.type || 'color');
      const [description, setDescription] = useState(marker?.description || '');

      const types = [
        { id: 'color', label: '颜色', class: 'tag-color' },
        { id: 'font', label: '字体', class: 'tag-font' },
        { id: 'spacing', label: '间距', class: 'tag-spacing' },
        { id: 'size', label: '尺寸', class: 'tag-size' },
        { id: 'other', label: '其他', class: 'tag-other' },
      ];

      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50" onClick={onClose}>
          <div className="bg-slate-800 rounded-xl p-6 w-[420px] border border-slate-700 animate-fadeIn" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-lg font-semibold mb-4">标注差异点</h3>

            <div className="mb-4">
              <label className="block text-sm text-slate-400 mb-2">问题类型</label>
              <div className="flex gap-2 flex-wrap">
                {types.map((t) => (
                  <button
                    key={t.id}
                    className={`tag cursor-pointer ${t.class} ${type === t.id ? 'ring-2 ring-offset-2 ring-offset-slate-800 ring-indigo-500' : ''}`}
                    onClick={() => setType(t.id)}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
            </div>

            <div className="mb-4">
              <label className="block text-sm text-slate-400 mb-2">问题描述</label>
              <textarea
                rows={3}
                placeholder="描述具体问题..."
                value={description}
                onChange={(e) => setDescription(e.target.value)}
                className="w-full resize-none"
              />
            </div>

            <div className="flex gap-3 justify-end">
              <button className="btn btn-secondary" onClick={onClose}>取消</button>
              <button className="btn" onClick={() => onSave({ type, description })}>确认添加</button>
            </div>
          </div>
        </div>
      );
    }

    function IssueList({ issues, onDelete, onExport, onClear }) {
      const typeLabels = { color: '颜色', font: '字体', spacing: '间距', size: '尺寸', other: '其他' };
      const typeClasses = { color: 'tag-color', font: 'tag-font', spacing: 'tag-spacing', size: 'tag-size', other: 'tag-other' };

      const autoCount = issues.filter(i => i.isAuto).length;

      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold">
              问题清单 ({issues.length})
              {autoCount > 0 && (
                <span className="ml-2 text-xs bg-pink-500/20 text-pink-400 px-2 py-0.5 rounded">
                  自动 {autoCount}
                </span>
              )}
            </h3>
            {issues.length > 0 && (
              <div className="flex gap-2">
                <button className="btn btn-secondary text-sm" onClick={onClear}>清空</button>
                <button className="btn btn-success text-sm" onClick={onExport}>导出报告</button>
              </div>
            )}
          </div>

          {issues.length === 0 ? (
            <div className="text-center py-8 text-slate-500">
              <p>点击「智能对比」自动检测差异，或点击图片手动标注</p>
            </div>
          ) : (
            <div className="space-y-3 max-h-64 overflow-y-auto">
              {issues.map((issue, idx) => (
                <div key={idx} className="flex items-start gap-3 p-3 bg-slate-700/50 rounded-lg">
                  <span className={`w-6 h-6 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0 ${issue.isAuto ? 'bg-pink-500' : 'bg-red-500'}`}>
                    {idx + 1}
                  </span>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1">
                      <span className={`tag ${typeClasses[issue.type]}`}>{typeLabels[issue.type]}</span>
                      {issue.isAuto && <span className="text-xs text-pink-400">🤖 自动</span>}
                    </div>
                    <p className="text-sm text-slate-300">{issue.description || '未填写描述'}</p>
                  </div>
                  <button className="text-slate-500 hover:text-red-500 transition" onClick={() => onDelete(idx)}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [designImage, setDesignImage] = useState(null);
      const [pageImage, setPageImage] = useState(null);
      const [mode, setMode] = useState('slider');
      const [markers, setMarkers] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [pendingMarker, setPendingMarker] = useState(null);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analyzeProgress, setAnalyzeProgress] = useState(0);
      const [analyzeStatus, setAnalyzeStatus] = useState('');
      const [diffData, setDiffData] = useState(null);

      const handleUpload = (type, data) => {
        if (type === 'design') setDesignImage(data);
        else setPageImage(data);
        setMarkers([]);
        setDiffData(null);
      };

      const handleImageClick = (e) => {
        if (!designImage && !pageImage) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        setPendingMarker({ x, y, isAuto: false });
        setShowModal(true);
      };

      const handleSaveMarker = (data) => {
        setMarkers([...markers, { ...data, x: pendingMarker.x, y: pendingMarker.y, isAuto: pendingMarker.isAuto }]);
        setShowModal(false);
        setPendingMarker(null);
      };

      const handleDeleteMarker = (idx) => setMarkers(markers.filter((_, i) => i !== idx));
      const handleClear = () => { setMarkers([]); setDiffData(null); };

      // 智能对比 - 简化的像素对比
      const handleAutoCompare = useCallback(async () => {
        if (!designImage || !pageImage) {
          alert('请先上传两张截图');
          return;
        }

        setIsAnalyzing(true);
        setAnalyzeProgress(10);
        setAnalyzeStatus('加载图片...');

        try {
          // 加载图片
          const img1 = new Image();
          const img2 = new Image();

          await new Promise((resolve, reject) => {
            img1.onload = resolve;
            img1.onerror = reject;
            img1.src = designImage;
          });

          setAnalyzeProgress(30);
          setAnalyzeStatus('处理中...');

          await new Promise((resolve, reject) => {
            img2.onload = resolve;
            img2.onerror = reject;
            img2.src = pageImage;
          });

          setAnalyzeProgress(50);

          // 获取尺寸
          const w = Math.max(img1.width, img2.width);
          const h = Math.max(img1.height, img2.height);

          // 创建画布
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');

          // 绘制第一张图
          ctx.fillStyle = '#1E293B';
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img1, 0, 0);
          const data1 = ctx.getImageData(0, 0, w, h);

          // 绘制第二张图
          ctx.fillStyle = '#1E293B';
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img2, 0, 0);
          const data2 = ctx.getImageData(0, 0, w, h);

          // 创建差异图
          const diffCanvas = document.createElement('canvas');
          diffCanvas.width = w;
          diffCanvas.height = h;
          const diffCtx = diffCanvas.getContext('2d');
          diffCtx.fillStyle = '#1E293B';
          diffCtx.fillRect(0, 0, w, h);
          const diffData = diffCtx.createImageData(w, h);

          setAnalyzeProgress(70);
          setAnalyzeStatus('对比像素...');

          // 逐像素对比
          const diffPixels = [];
          const threshold = 30; // 颜色差异阈值

          for (let i = 0; i < data1.data.length; i += 4) {
            const r1 = data1.data[i], g1 = data1.data[i+1], b1 = data1.data[i+2];
            const r2 = data2.data[i], g2 = data2.data[i+1], b2 = data2.data[i+2];

            // 计算颜色差异
            const diff = Math.sqrt(
              Math.pow(r1 - r2, 2) + Math.pow(g1 - g2, 2) + Math.pow(b1 - b2, 2)
            );

            if (diff > threshold) {
              // 标记为红色
              diffData.data[i] = 255;
              diffData.data[i+1] = 68;
              diffData.data[i+2] = 68;
              diffData.data[i+3] = 255;

              const x = (i / 4) % w;
              const y = Math.floor((i / 4) / w);
              diffPixels.push({ x, y });
            } else {
              // 保持原图
              diffData.data[i] = data1.data[i];
              diffData.data[i+1] = data1.data[i+1];
              diffData.data[i+2] = data1.data[i+2];
              diffData.data[i+3] = 180; // 半透明
            }
          }

          setAnalyzeProgress(90);
          setAnalyzeStatus('生成报告...');

          diffCtx.putImageData(diffData, 0, 0);
          const diffImage = diffCanvas.toDataURL('image/png');
          setDiffData(diffImage);

          // 聚类分析找出主要差异区域
          const gridSize = 40;
          const grid = {};

          diffPixels.forEach(p => {
            const gx = Math.floor(p.x / gridSize);
            const gy = Math.floor(p.y / gridSize);
            const key = `${gx},${gy}`;
            grid[key] = (grid[key] || 0) + 1;
          });

          // 找出高密度差异区域
          const regions = Object.entries(grid)
            .filter(([_, count]) => count > 5)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8);

          // 生成标注
          const newMarkers = [];
          const typeDesc = {
            spacing: '间距/对齐问题',
            size: '尺寸/大小问题',
            color: '颜色差异',
            font: '字体/文字问题',
            other: '视觉差异'
          };

          regions.forEach(([key, count]) => {
            const [gx, gy] = key.split(',').map(Number);
            const centerX = ((gx * gridSize + gridSize / 2) / w) * 100;
            const centerY = ((gy * gridSize + gridSize / 2) / h) * 100;

            // 简单判断问题类型
            let type = 'other';
            const regionW = gridSize;
            const regionH = gridSize;
            if (regionW > regionH * 2) type = 'spacing';
            else if (regionH > regionW * 2) type = 'size';
            else if (count > 30) type = 'color';

            newMarkers.push({
              x: centerX,
              y: centerY,
              type,
              description: `${typeDesc[type]}，差异像素数: ${count}`,
              isAuto: true
            });
          });

          setMarkers(newMarkers);
          setAnalyzeProgress(100);
          setAnalyzeStatus('完成!');

          setTimeout(() => {
            setIsAnalyzing(false);
            setMode('diff');
          }, 500);

        } catch (error) {
          console.error('分析失败:', error);
          alert('分析失败: ' + error.message);
          setIsAnalyzing(false);
        }
      }, [designImage, pageImage]);

      const handleExport = () => {
        const typeLabels = { color: '颜色', font: '字体', spacing: '间距', size: '尺寸', other: '其他' };
        let report = `# UI 视觉走查报告\n\n`;
        report += `**时间**: ${new Date().toLocaleString()}\n\n`;
        report += `---\n\n## 问题清单 (${markers.length}个)\n\n`;
        report += `| # | 类型 | 描述 | 来源 |\n|---|------|------|------|\n`;
        markers.forEach((m, i) => {
          report += `| ${i+1} | ${typeLabels[m.type]} | ${m.description || '-'} | ${m.isAuto ? '🤖 自动' : '👤 手动'} |\n`;
        });

        const blob = new Blob([report], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `UI走查报告_${new Date().toISOString().slice(0,10)}.md`;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="min-h-screen flex flex-col">
          <Header />
          <main className="flex-1 p-6 max-w-6xl mx-auto w-full">
            <UploadSection onUpload={handleUpload} />

            <div className="flex gap-2 mb-4">
              <button
                className={`px-4 py-2 rounded-lg text-sm cursor-pointer transition ${mode === 'slider' ? 'bg-indigo-500 text-white' : 'bg-slate-700 text-slate-400'}`}
                onClick={() => setMode('slider')}
              >
                滑块对比
              </button>
              <button
                className={`px-4 py-2 rounded-lg text-sm cursor-pointer transition ${mode === 'overlay' ? 'bg-indigo-500 text-white' : 'bg-slate-700 text-slate-400'}`}
                onClick={() => setMode('overlay')}
              >
                叠加对比
              </button>
              <button
                className={`px-4 py-2 rounded-lg text-sm cursor-pointer transition ${mode === 'diff' ? 'bg-indigo-500 text-white' : 'bg-slate-700 text-slate-400'}`}
                onClick={() => setMode('diff')}
              >
                差异高亮
              </button>
              <div className="flex-1" />
              <button
                className="btn btn-danger text-sm"
                onClick={handleAutoCompare}
                disabled={!designImage || !pageImage || isAnalyzing}
              >
                {isAnalyzing ? '分析中...' : '🤖 智能对比'}
              </button>
              <button className="btn btn-secondary text-sm" onClick={handleClear}>重置</button>
            </div>

            {mode === 'slider' && (
              <CompareSlider designImage={designImage} pageImage={pageImage} onClick={handleImageClick} />
            )}
            {mode === 'overlay' && (
              <CompareOverlay designImage={designImage} pageImage={pageImage} onClick={handleImageClick} />
            )}
            {mode === 'diff' && (
              <CompareDiff designImage={designImage} pageImage={pageImage} diffData={diffData} markers={markers} onClick={handleImageClick} />
            )}

            <div className="mt-4">
              <IssueList
                issues={markers}
                onDelete={handleDeleteMarker}
                onExport={handleExport}
                onClear={handleClear}
              />
            </div>
          </main>

          <footer className="text-center py-4 text-slate-500 text-sm border-t border-slate-700">
            UI 截图对比工具 - 本地运行，保护隐私
          </footer>

          {showModal && (
            <MarkerModal
              marker={pendingMarker}
              onSave={handleSaveMarker}
              onClose={() => { setShowModal(false); setPendingMarker(null); }}
            />
          )}

          {isAnalyzing && <AnalyzeModal progress={analyzeProgress} status={analyzeStatus} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
