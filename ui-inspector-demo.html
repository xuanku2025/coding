<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Visual Inspector - 视觉走查工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/react-compare-slider@3.1.0/dist/styles.min.css" />
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg-dark: #0F172A;
      --bg-card: #1E293B;
      --border: #334155;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* 滑块对比组件样式 */
    .react-compare-slider {
      width: 100%;
      height: 100%;
    }
    .react-compare-slider handle {
      width: 4px;
      background: var(--primary) !important;
    }
    .react-compare-slider handle::after {
      content: '⟷';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--primary) !important;
      color: white;
      padding: 8px;
      border-radius: 50%;
      font-size: 14px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    /* 卡片样式 */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* 输入框样式 */
    input, select, textarea {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
    }

    /* 按钮样式 */
    .btn {
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    /* 标签样式 */
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }
    .tag-color { background: #FEF3C7; color: #92400E; }
    .tag-font { background: #DBEAFE; color: #1E40AF; }
    .tag-spacing { background: #D1FAE5; color: #065F46; }
    .tag-size { background: #E0E7FF; color: #3730A3; }
    .tag-other { background: #F3F4F6; color: #374151; }

    /* 标注点样式 */
    .marker {
      position: absolute;
      width: 24px;
      height: 24px;
      background: #EF4444;
      border: 2px solid white;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: white;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
      transition: transform 0.2s;
    }
    .marker:hover { transform: translate(-50%, -50%) scale(1.2); }

    /* 动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.3s ease; }

    /* 对比区域 */
    .compare-container {
      position: relative;
      width: 100%;
      height: 500px;
      background: #0F172A;
      border-radius: 8px;
      overflow: hidden;
    }
    .compare-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #1E293B;
    }
    .compare-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 12px;
    }

    /* 模式切换按钮 */
    .mode-btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
    }
    .mode-btn.active {
      background: var(--primary);
      color: white;
    }
    .mode-btn:not(.active):hover {
      background: var(--border);
      color: var(--text);
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <!-- React + ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============ 模拟数据 ============
    const mockDesignImage = 'data:image/svg+xml,' + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
        <rect fill="#1E293B" width="800" height="500"/>
        <rect fill="#4F46E5" x="50" y="40" width="200" height="60" rx="8"/>
        <text fill="white" x="70" y="77" font-family="sans-serif" font-size="18">UI Design</text>
        <rect fill="#334155" x="50" y="120" width="320" height="180" rx="8"/>
        <text fill="#94A3B8" x="70" y="200" font-family="sans-serif" font-size="24">Hero Section</text>
        <text fill="#64748B" x="70" y="240" font-family="sans-serif" font-size="14">Design by Figma</text>
        <rect fill="#10B981" x="50" y="320" width="320" height="80" rx="8"/>
        <text fill="white" x="70" y="368" font-family="sans-serif" font-size="16">Call to Action Button</text>
        <rect fill="#475569" x="400" y="40" width="350" height="360" rx="8"/>
        <text fill="#F8FAFC" x="420" y="100" font-family="sans-serif" font-size="20">Sidebar</text>
        <rect fill="#334155" x="420" y="130" width="200" height="40" rx="6"/>
        <rect fill="#334155" x="420" y="180" width="200" height="40" rx="6"/>
        <rect fill="#334155" x="420" y="230" width="200" height="40" rx="6"/>
      </svg>
    `);

    const mockPageImage = 'data:image/svg+xml,' + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
        <rect fill="#1E293B" width="800" height="500"/>
        <rect fill="#6366F1" x="50" y="40" width="200" height="60" rx="8"/>
        <text fill="white" x="70" y="77" font-family="sans-serif" font-size="18">UI Design</text>
        <rect fill="#334155" x="50" y="120" width="320" height="180" rx="8"/>
        <text fill="#94A3B8" x="70" y="200" font-family="sans-serif" font-size="22">Hero Section (Diff!)</text>
        <text fill="#64748B" x="70" y="240" font-family="sans-serif" font-size="14">Implemented in React</text>
        <rect fill="#059669" x="50" y="320" width="280" height="80" rx="8"/>
        <text fill="white" x="70" y="368" font-family="sans-serif" font-size="16">CTA (Width Diff!)</text>
        <rect fill="#475569" x="400" y="40" width="350" height="360" rx="8"/>
        <text fill="#F8FAFC" x="420" y="100" font-family="sans-serif" font-size="20">Sidebar</text>
        <rect fill="#334155" x="420" y="130" width="200" height="40" rx="6"/>
        <rect fill="#334155" x="420" y="180" width="200" height="40" rx="6"/>
        <rect fill="#334155" x="420" y="230" width="200" height="40" rx="6"/>
      </svg>
    `);

    // ============ 组件 ============

    // 头部导航
    function Header({ activeTab, setActiveTab, onOpenSettings }) {
      return (
        <header className="flex items-center justify-between px-6 py-4 border-b border-slate-700">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4M12 8h.01"/>
              </svg>
            </div>
            <h1 className="text-xl font-semibold">UI Visual Inspector</h1>
          </div>
          <nav className="flex gap-2">
            <button
              className={`px-4 py-2 rounded-lg transition ${activeTab === 'inspect' ? 'bg-indigo-500 text-white' : 'text-slate-400 hover:text-white'}`}
              onClick={() => setActiveTab('inspect')}
            >
              走查工具
            </button>
            <button
              className={`px-4 py-2 rounded-lg transition ${activeTab === 'history' ? 'bg-indigo-500 text-white' : 'text-slate-400 hover:text-white'}`}
              onClick={() => setActiveTab('history')}
            >
              历史记录
            </button>
            <button
              className="px-4 py-2 rounded-lg text-slate-400 hover:text-white transition"
              onClick={onOpenSettings}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
          </nav>
        </header>
      );
    }

    // 输入区域
    function InputSection({ config, setConfig, onCapture }) {
      return (
        <div className="grid grid-cols-2 gap-4 mb-4">
          <div className="card p-4">
            <label className="block text-sm text-slate-400 mb-2">Figma 设计稿链接</label>
            <input
              type="text"
              placeholder="https://www.figma.com/design/xxx?node-id=xxx"
              value={config.figmaUrl}
              onChange={(e) => setConfig({...config, figmaUrl: e.target.value})}
              className="w-full"
            />
            <div className="mt-2 text-xs text-slate-500">
              或手动上传: <input type="file" accept="image/*" className="text-xs" />
            </div>
          </div>
          <div className="card p-4">
            <label className="block text-sm text-slate-400 mb-2">前端页面 URL</label>
            <div className="flex gap-2">
              <input
                type="text"
                placeholder="https://example.com/page"
                value={config.pageUrl}
                onChange={(e) => setConfig({...config, pageUrl: e.target.value})}
                className="flex-1"
              />
              <select
                value={config.viewport}
                onChange={(e) => setConfig({...config, viewport: e.target.value})}
                className="w-32"
              >
                <option value="1920x1080">Desktop</option>
                <option value="375x667">Mobile</option>
                <option value="768x1024">Tablet</option>
              </select>
            </div>
          </div>
        </div>
      );
    }

    // 滑块对比组件（简化版）
    function CompareSlider({ designImage, pageImage }) {
      const [sliderPosition, setSliderPosition] = useState(50);
      const containerRef = useRef(null);
      const [isDragging, setIsDragging] = useState(false);

      const handleMouseMove = (e) => {
        if (!isDragging || !containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        setSliderPosition(x);
      };

      useEffect(() => {
        if (isDragging) {
          window.addEventListener('mousemove', handleMouseMove);
          window.addEventListener('mouseup', () => setIsDragging(false));
        }
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', () => setIsDragging(false));
        };
      }, [isDragging]);

      if (!designImage && !pageImage) {
        return (
          <div className="compare-container">
            <div className="compare-placeholder">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M9 3v18M21 9H3"/>
              </svg>
              <p>输入 Figma 链接和页面 URL 后开始对比</p>
            </div>
          </div>
        );
      }

      return (
        <div
          ref={containerRef}
          className="compare-container relative cursor-ew-resize select-none"
          onMouseDown={(e) => setIsDragging(true)}
        >
          {/* 设计稿 (左侧) */}
          <div className="absolute inset-0">
            <img src={designImage || pageImage} alt="设计稿" className="compare-image" />
            <div className="absolute top-3 left-3 bg-indigo-500 text-white text-xs px-2 py-1 rounded">
              设计稿 (Figma)
            </div>
          </div>

          {/* 页面截图 (右侧，裁剪) */}
          {pageImage && (
            <div
              className="absolute inset-0 overflow-hidden"
              style={{ clipPath: `inset(0 ${100 - sliderPosition}% 0 0)` }}
            >
              <img src={pageImage} alt="页面截图" className="compare-image" />
              <div className="absolute top-3 right-3 bg-emerald-500 text-white text-xs px-2 py-1 rounded">
                实装页面
              </div>
            </div>
          )}

          {/* 滑块手柄 */}
          <div
            className="absolute top-0 bottom-0 w-1 bg-indigo-500 cursor-ew-resize z-10"
            style={{ left: `${sliderPosition}%` }}
          >
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-white shadow-lg">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M18 8L22 12L18 16M6 8L2 12L6 16"/>
              </svg>
            </div>
          </div>
        </div>
      );
    }

    // 标注点
    function Marker({ marker, onClick, onDelete }) {
      return (
        <div
          className="marker"
          style={{ left: marker.x + '%', top: marker.y + '%' }}
          onClick={(e) => {
            e.stopPropagation();
            onClick(marker);
          }}
          title={marker.description}
        >
          {marker.index + 1}
        </div>
      );
    }

    // 标注弹窗
    function MarkerModal({ marker, onSave, onClose }) {
      const [type, setType] = useState(marker?.type || 'color');
      const [description, setDescription] = useState(marker?.description || '');

      const types = [
        { id: 'color', label: '颜色', class: 'tag-color' },
        { id: 'font', label: '字体', class: 'tag-font' },
        { id: 'spacing', label: '间距', class: 'tag-spacing' },
        { id: 'size', label: '尺寸', class: 'tag-size' },
        { id: 'other', label: '其他', class: 'tag-other' },
      ];

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={onClose}>
          <div className="card p-6 w-[480px] animate-fadeIn" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-lg font-semibold mb-4">标注差异点</h3>

            <div className="mb-4">
              <label className="block text-sm text-slate-400 mb-2">问题类型</label>
              <div className="flex gap-2 flex-wrap">
                {types.map((t) => (
                  <button
                    key={t.id}
                    className={`tag ${t.class} ${type === t.id ? 'ring-2 ring-offset-2 ring-offset-slate-800 ring-indigo-500' : ''}`}
                    onClick={() => setType(t.id)}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
            </div>

            <div className="mb-4">
              <label className="block text-sm text-slate-400 mb-2">问题描述</label>
              <textarea
                rows={4}
                placeholder="描述具体问题..."
                value={description}
                onChange={(e) => setDescription(e.target.value)}
                className="w-full resize-none"
              />
            </div>

            <div className="mb-4">
              <label className="block text-sm text-slate-400 mb-2">差异截图预览</label>
              <div className="bg-slate-800 rounded-lg h-32 flex items-center justify-center text-slate-500">
                差异区域截图
              </div>
            </div>

            <div className="flex gap-3 justify-end">
              <button className="btn btn-secondary" onClick={onClose}>取消</button>
              <button
                className="btn"
                onClick={() => onSave({ ...marker, type, description })}
              >
                确认添加
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 问题列表
    function IssueList({ issues, onDelete, onSubmitJira, jiraConfig }) {
      const typeLabels = {
        color: '颜色',
        font: '字体',
        spacing: '间距',
        size: '尺寸',
        other: '其他'
      };
      const typeClasses = {
        color: 'tag-color',
        font: 'tag-font',
        spacing: 'tag-spacing',
        size: 'tag-size',
        other: 'tag-other'
      };

      return (
        <div className="card p-4">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold">问题清单 ({issues.length})</h3>
            {issues.length > 0 && (
              <button
                className="btn text-sm"
                onClick={onSubmitJira}
                disabled={!jiraConfig.isConfigured}
              >
                提交 Jira Bug
              </button>
            )}
          </div>

          {issues.length === 0 ? (
            <div className="text-center py-8 text-slate-500">
              点击对比区域标记差异点
            </div>
          ) : (
            <div className="space-y-3 max-h-64 overflow-y-auto">
              {issues.map((issue, idx) => (
                <div key={idx} className="flex items-start gap-3 p-3 bg-slate-800 rounded-lg">
                  <span className="w-6 h-6 bg-red-500 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0">
                    {idx + 1}
                  </span>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1">
                      <span className={`tag ${typeClasses[issue.type]}`}>{typeLabels[issue.type]}</span>
                    </div>
                    <p className="text-sm text-slate-300 truncate">{issue.description || '未填写描述'}</p>
                  </div>
                  <button
                    className="text-slate-500 hover:text-red-500 transition"
                    onClick={() => onDelete(idx)}
                  >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // 设置弹窗
    function SettingsModal({ config, setConfig, onClose }) {
      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={onClose}>
          <div className="card p-6 w-[520px] animate-fadeIn" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-6">
              <h3 className="text-lg font-semibold">Jira 配置</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>

            <div className="space-y-4">
              <div>
                <label className="block text-sm text-slate-400 mb-2">Jira 实例地址</label>
                <input
                  type="text"
                  placeholder="https://yourcompany.atlassian.net"
                  value={config.jiraUrl}
                  onChange={(e) => setConfig({...config, jiraUrl: e.target.value})}
                  className="w-full"
                />
              </div>
              <div>
                <label className="block text-sm text-slate-400 mb-2">登录邮箱</label>
                <input
                  type="email"
                  placeholder="your@email.com"
                  value={config.jiraEmail}
                  onChange={(e) => setConfig({...config, jiraEmail: e.target.value})}
                  className="w-full"
                />
              </div>
              <div>
                <label className="block text-sm text-slate-400 mb-2">API Token</label>
                <input
                  type="password"
                  placeholder="请输入 Jira API Token"
                  value={config.jiraToken}
                  onChange={(e) => setConfig({...config, jiraToken: e.target.value})}
                  className="w-full"
                />
                <a href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank" className="text-xs text-indigo-400 hover:underline mt-1 inline-block">
                  前往生成 API Token →
                </a>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-2">项目 Key</label>
                  <input
                    type="text"
                    placeholder="如: PROJ"
                    value={config.jiraProjectKey}
                    onChange={(e) => setConfig({...config, jiraProjectKey: e.target.value})}
                    className="w-full"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Issue Type</label>
                  <select
                    value={config.jiraIssueType}
                    onChange={(e) => setConfig({...config, jiraIssueType: e.target.value})}
                    className="w-full"
                  >
                    <option value="Bug">Bug</option>
                    <option value="Task">Task</option>
                    <option value="Story">Story</option>
                  </select>
                </div>
              </div>
            </div>

            <div className="flex gap-3 justify-end mt-6">
              <button className="btn btn-secondary" onClick={onClose}>取消</button>
              <button
                className="btn"
                onClick={() => {
                  setConfig({...config, isConfigured: true});
                  onClose();
                }}
              >
                保存配置
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 历史记录页面
    function HistoryPage() {
      const history = [
        { id: 1, page: '首页', date: '2026-03-04 15:30', issues: 3, status: '已提交' },
        { id: 2, page: '个人中心', date: '2026-03-04 14:20', issues: 5, status: '待处理' },
        { id: 3, page: '商品详情', date: '2026-03-03 16:45', issues: 2, status: '已提交' },
      ];

      return (
        <div className="p-6">
          <h2 className="text-xl font-semibold mb-6">历史记录</h2>
          <div className="space-y-3">
            {history.map((item) => (
              <div key={item.id} className="card p-4 flex items-center justify-between">
                <div>
                  <h4 className="font-medium">{item.page}</h4>
                  <p className="text-sm text-slate-400">{item.date} · {item.issues} 个问题</p>
                </div>
                <span className={`tag ${item.status === '已提交' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {item.status}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // 主应用
    function App() {
      const [activeTab, setActiveTab] = useState('inspect');
      const [showSettings, setShowSettings] = useState(false);
      const [config, setConfig] = useState({
        figmaUrl: '',
        pageUrl: '',
        viewport: '1920x1080',
        jiraUrl: '',
        jiraEmail: '',
        jiraToken: '',
        jiraProjectKey: '',
        jiraIssueType: 'Bug',
        isConfigured: false
      });

      const [designImage, setDesignImage] = useState(null);
      const [pageImage, setPageImage] = useState(null);
      const [showMarkerModal, setShowMarkerModal] = useState(false);
      const [pendingMarker, setPendingMarker] = useState(null);
      const [issues, setIssues] = useState([]);

      const [mode, setMode] = useState('slider'); // slider, overlay, diff

      // 模拟获取截图
      const handleCapture = () => {
        // 使用模拟图片
        setDesignImage(mockDesignImage);
        setPageImage(mockPageImage);
      };

      // 点击标记差异点
      const handleImageClick = (e) => {
        if (!designImage && !pageImage) return;

        const rect = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        setPendingMarker({ x, y, index: issues.length });
        setShowMarkerModal(true);
      };

      // 保存标注
      const handleSaveMarker = (markerData) => {
        setIssues([...issues, { ...markerData, x: pendingMarker.x, y: pendingMarker.y }]);
        setShowMarkerModal(false);
        setPendingMarker(null);
      };

      // 删除标注
      const handleDeleteIssue = (idx) => {
        setIssues(issues.filter((_, i) => i !== idx));
      };

      // 提交 Jira
      const handleSubmitJira = () => {
        if (!config.isConfigured) {
          setShowSettings(true);
          return;
        }
        alert(`提交 ${issues.length} 个问题到 Jira\n\n配置信息:\n${config.jiraUrl}\n${config.jiraEmail}\n项目: ${config.jiraProjectKey}`);
      };

      return (
        <div className="min-h-screen flex flex-col">
          <Header
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            onOpenSettings={() => setShowSettings(true)}
          />

          {activeTab === 'inspect' ? (
            <main className="flex-1 p-6">
              <InputSection
                config={config}
                setConfig={setConfig}
                onCapture={handleCapture}
              />

              <div className="flex gap-2 mb-4">
                <button className={`mode-btn ${mode === 'slider' ? 'active' : ''}`} onClick={() => setMode('slider')}>
                  滑块对比
                </button>
                <button className={`mode-btn ${mode === 'overlay' ? 'active' : ''}`} onClick={() => setMode('overlay')}>
                  叠加对比
                </button>
                <button className={`mode-btn ${mode === 'diff' ? 'active' : ''}`} onClick={() => setMode('diff')}>
                  差异高亮
                </button>
                <div className="flex-1" />
                <button className="btn text-sm" onClick={handleCapture}>
                  加载示例数据
                </button>
              </div>

              <div className="card p-1 mb-4 relative" onClick={handleImageClick}>
                <CompareSlider designImage={designImage} pageImage={pageImage} />

                {/* 标注点 */}
                {issues.map((issue, idx) => (
                  <Marker
                    key={idx}
                    marker={{ ...issue, index: idx }}
                    onClick={(m) => {
                      setPendingMarker(m);
                      setShowMarkerModal(true);
                    }}
                    onDelete={() => handleDeleteIssue(idx)}
                  />
                ))}
              </div>

              <IssueList
                issues={issues}
                onDelete={handleDeleteIssue}
                onSubmitJira={handleSubmitJira}
                jiraConfig={config}
              />
            </main>
          ) : (
            <HistoryPage />
          )}

          {showSettings && (
            <SettingsModal
              config={config}
              setConfig={setConfig}
              onClose={() => setShowSettings(false)}
            />
          )}

          {showMarkerModal && (
            <MarkerModal
              marker={pendingMarker}
              onSave={handleSaveMarker}
              onClose={() => {
                setShowMarkerModal(false);
                setPendingMarker(null);
              }}
            />
          )}
        </div>
      );
    }

    // 渲染
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
