<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加原生密钥提供程序 (NKP) - ZSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between sticky top-0 bg-white">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-slate-900">添加原生密钥提供程序</h3>
                        <p class="text-sm text-slate-500">Native Key Provider (NKP)</p>
                    </div>
                </div>
                <button class="text-slate-400 hover:text-slate-600 p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="p-6 space-y-6">
                <!-- Info Banner -->
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 flex items-start gap-3">
                    <svg class="w-5 h-5 text-blue-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <div>
                        <p class="text-sm text-blue-800">NKP 使用 Key Derivation Key (KDK) 为每个虚拟机生成唯一的 KEK。KDK 存储在主机的 TPM 或加密配置中。</p>
                    </div>
                </div>

                <!-- Step Indicator -->
                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-2">
                        <span class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center text-sm font-medium">1</span>
                        <span class="text-sm font-medium text-indigo-600">基本配置</span>
                    </div>
                    <div class="w-12 h-0.5 bg-slate-300"></div>
                    <div class="flex items-center gap-2">
                        <span class="w-8 h-8 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center text-sm font-medium">2</span>
                        <span class="text-sm text-slate-500">高可用设置</span>
                    </div>
                    <div class="w-12 h-0.5 bg-slate-300"></div>
                    <div class="flex items-center gap-2">
                        <span class="w-8 h-8 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center text-sm font-medium">3</span>
                        <span class="text-sm text-slate-500">确认</span>
                    </div>
                </div>

                <!-- Form -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">
                            名称 <span class="text-red-500">*</span>
                        </label>
                        <input type="text" class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="例如: Production-NKP">
                        <p class="text-xs text-slate-500 mt-1.5">名称在全局唯一标识此 Key Provider，用于跨 MN 迁移和灾备场景</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">描述</label>
                        <textarea rows="2" class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="可选：描述此 NKP 的用途..."></textarea>
                    </div>

                    <div class="p-4 border border-slate-200 rounded-lg bg-slate-50">
                        <div class="flex items-center justify-between mb-3">
                            <label class="text-sm font-medium text-slate-700">允许无 TPM 的主机</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" checked>
                                <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                            </label>
                        </div>
                        <p class="text-xs text-slate-500">启用后，没有 TPM 的物理主机也可以参与 NKP。KDK 将存储在主机的加密配置中。</p>
                    </div>

                    <div class="p-4 border border-slate-200 rounded-lg">
                        <div class="flex items-center gap-3 mb-3">
                            <input type="checkbox" id="ha-enable" class="w-4 h-4 text-indigo-600 rounded border-slate-300" checked>
                            <label for="ha-enable" class="text-sm font-medium text-slate-700">启用高可用</label>
                        </div>
                        <p class="text-xs text-slate-500">确保 KDK 在多个主机上备份，防止单点故障</p>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-200 flex justify-between sticky bottom-0 bg-white">
                <button class="px-4 py-2 text-slate-700 hover:bg-slate-100 rounded-lg font-medium transition-colors">取消</button>
                <div class="flex gap-3">
                    <button class="px-4 py-2 text-slate-700 hover:bg-slate-100 rounded-lg font-medium transition-colors" disabled>上一步</button>
                    <button class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors">下一步</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
