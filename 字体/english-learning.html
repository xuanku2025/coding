<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词学习小程序</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
            --gray: #94a3b8;
            --card-shadow: 0 10px 40px -10px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 90vh;
            max-height: 800px;
            background: var(--white);
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .header {
            background: var(--primary);
            padding: 24px 20px;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.85;
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Progress Section */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--gray);
        }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Flashcard */
        .flashcard-container {
            flex: 1;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .flashcard-front {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            border: 2px solid #e2e8f0;
        }

        .flashcard-back {
            background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            transform: rotateY(180deg);
        }

        .word-text {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--dark);
        }

        .phonetic {
            font-size: 16px;
            color: var(--gray);
            margin-bottom: 20px;
        }

        .part-of-speech {
            font-size: 13px;
            background: var(--primary);
            color: var(--white);
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .meaning {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .example {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            font-style: italic;
            line-height: 1.6;
        }

        .tap-hint {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flashcard-front .tap-hint {
            color: var(--gray);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-previous {
            background: #f1f5f9;
            color: var(--dark);
        }

        .btn-next {
            background: var(--primary);
            color: var(--white);
        }

        .btn-remember {
            background: var(--secondary);
            color: var(--white);
        }

        .btn-forget {
            background: var(--danger);
            color: var(--white);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            background: var(--light);
            padding: 8px;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .tab-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-item.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
        }

        /* Word List */
        .word-list {
            flex: 1;
            overflow-y: auto;
        }

        .word-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .word-item:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .word-item.learned {
            border-color: var(--secondary);
            background: rgba(16, 185, 129, 0.05);
        }

        .word-number {
            width: 32px;
            height: 32px;
            background: var(--light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray);
            margin-right: 14px;
        }

        .word-info {
            flex: 1;
        }

        .word-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 2px;
        }

        .word-meaning-item {
            font-size: 12px;
            color: var(--gray);
        }

        .word-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .word-status.learned {
            background: var(--secondary);
            color: var(--white);
        }

        .word-status.pending {
            background: #e2e8f0;
            color: var(--gray);
        }

        /* Quiz Section */
        .quiz-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .quiz-progress {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }

        .quiz-dot {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e2e8f0;
            transition: all 0.3s ease;
        }

        .quiz-dot.active {
            background: var(--primary);
        }

        .quiz-dot.correct {
            background: var(--secondary);
        }

        .quiz-dot.wrong {
            background: var(--danger);
        }

        .quiz-question {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            text-align: center;
            margin-bottom: 24px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-option {
            padding: 18px 20px;
            background: var(--white);
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            color: var(--dark);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .quiz-option.correct {
            border-color: var(--secondary);
            background: rgba(16, 185, 129, 0.1);
        }

        .quiz-option.wrong {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            background: var(--white);
            border-top: 1px solid #e2e8f0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--gray);
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .nav-icon {
            font-size: 20px;
        }

        .nav-text {
            font-size: 11px;
            font-weight: 500;
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: slideIn 0.4s ease forwards;
        }

        /* Hidden sections */
        .section {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .section.active {
            display: flex;
        }
    </style>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>🌟 英语单词学习</h1>
            <p>每天进步一点点</p>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-icon">📚</div>
                    <span id="totalWords">50 词</span>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">✅</div>
                    <span id="learnedWords">12 已学</span>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">🔥</div>
                    <span id="streakDays">3 天</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Learn Section -->
            <div class="section active" id="learnSection">
                <div class="progress-section">
                    <div class="progress-header">
                        <span>学习进度</span>
                        <span id="progressText">24%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 24%"></div>
                    </div>
                </div>

                <div class="flashcard-container">
                    <div class="flashcard" id="flashcard">
                        <div class="flashcard-face flashcard-front">
                            <div class="word-text" id="wordText">abandon</div>
                            <div class="phonetic" id="phonetic">/əˈbændən/</div>
                            <div class="part-of-speech" id="pos">v.</div>
                            <div class="tap-hint">👆 点击查看释义</div>
                        </div>
                        <div class="flashcard-face flashcard-back">
                            <div class="meaning" id="meaning">放弃；遗弃；放任</div>
                            <div class="example" id="example">"He had to abandon his car in the snow."</div>
                            <div class="example" style="margin-top: 8px; opacity: 0.7;">他不得不把车遗弃在雪地里。</div>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-previous" onclick="previousWord()">⬅️ 上一个</button>
                    <button class="btn btn-remember" onclick="markAsLearned()">✅ 掌握</button>
                    <button class="btn btn-next" onclick="nextWord()">下一个 ➡️</button>
                </div>
            </div>

            <!-- Word List Section -->
            <div class="section" id="listSection">
                <div class="tab-nav">
                    <div class="tab-item active" onclick="filterWords('all')">全部</div>
                    <div class="tab-item" onclick="filterWords('learning')">学习中</div>
                    <div class="tab-item" onclick="filterWords('learned')">已掌握</div>
                </div>
                <div class="word-list" id="wordList">
                    <!-- Word items will be rendered here -->
                </div>
            </div>

            <!-- Quiz Section -->
            <div class="section" id="quizSection">
                <div class="quiz-container">
                    <div class="quiz-progress" id="quizProgress">
                        <div class="quiz-dot active"></div>
                        <div class="quiz-dot"></div>
                        <div class="quiz-dot"></div>
                        <div class="quiz-dot"></div>
                        <div class="quiz-dot"></div>
                    </div>
                    <div class="quiz-question" id="quizQuestion">abandon 的意思是？</div>
                    <div class="quiz-options" id="quizOptions">
                        <!-- Quiz options will be rendered here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('learn')">
                <span class="nav-icon">📖</span>
                <span class="nav-text">学习</span>
            </div>
            <div class="nav-item" onclick="switchTab('list')">
                <span class="nav-icon">📋</span>
                <span class="nav-text">词表</span>
            </div>
            <div class="nav-item" onclick="switchTab('quiz')">
                <span class="nav-icon">🎯</span>
                <span class="nav-text">测验</span>
            </div>
        </div>
    </div>

    <script>
        // Word data
        const words = [
            { word: 'abandon', phonetic: '/əˈbændən/', pos: 'v.', meaning: '放弃；遗弃', example: 'He had to abandon his car in the snow.', learned: false },
            { word: 'benefit', phonetic: '/ˈbenɪfɪt/', pos: 'n.', meaning: '利益；好处', example: 'Exercise has many health benefits.', learned: true },
            { word: 'challenge', phonetic: '/ˈtʃælɪndʒ/', pos: 'n./v.', meaning: '挑战；质疑', example: 'I accept the challenge.', learned: false },
            { word: 'determine', phonetic: '/dɪˈtɜːrmɪn/', pos: 'v.', meaning: '决定；确定', example: 'She determined to work harder.', learned: true },
            { word: 'effort', phonetic: '/ˈefərt/', pos: 'n.', meaning: '努力；尝试', example: 'It requires a lot of effort.', learned: false },
            { word: 'fundamental', phonetic: '/ˌfʌndəˈmentl/', pos: 'adj.', meaning: '基本的；根本的', example: 'This is a fundamental truth.', learned: false },
            { word: 'generate', phonetic: '/ˈdʒenəreɪt/', pos: 'v.', meaning: '产生；生成', example: 'The project will generate jobs.', learned: false },
            { word: 'highlight', phonetic: '/ˈhaɪlaɪt/', pos: 'v./n.', meaning: '强调；亮点', example: 'Let me highlight the main points.', learned: true },
            { word: 'identify', phonetic: '/aɪˈdentɪfaɪ/', pos: 'v.', meaning: '识别；认出', example: 'Can you identify the problem?', learned: false },
            { word: 'implement', phonetic: '/ˈɪmplɪment/', pos: 'v.', meaning: '实施；执行', example: 'We will implement the plan.', learned: false }
        ];

        let currentIndex = 0;
        let quizIndex = 0;
        let currentFilter = 'all';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderWordList();
            renderQuiz();
            updateProgress();

            // Flashcard flip
            document.getElementById('flashcard').addEventListener('click', function() {
                this.classList.toggle('flipped');
            });
        });

        // Update progress
        function updateProgress() {
            const learned = words.filter(w => w.learned).length;
            const total = words.length;
            const percent = Math.round((learned / total) * 100);

            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
            document.getElementById('learnedWords').textContent = learned + ' 已学';
        }

        // Navigate words
        function nextWord() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function previousWord() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function updateCard() {
            const card = document.getElementById('flashcard');
            card.classList.remove('flipped');

            setTimeout(() => {
                const word = words[currentIndex];
                document.getElementById('wordText').textContent = word.word;
                document.getElementById('phonetic').textContent = word.phonetic;
                document.getElementById('pos').textContent = word.pos;
                document.getElementById('meaning').textContent = word.meaning;
                document.getElementById('example').textContent = '"' + word.example + '"';
            }, 200);
        }

        function markAsLearned() {
            words[currentIndex].learned = true;
            updateProgress();
            renderWordList();

            // Visual feedback
            const btn = document.querySelector('.btn-remember');
            btn.textContent = '✅ 已掌握';
            setTimeout(() => {
                btn.innerHTML = '✅ 掌握';
                if (currentIndex < words.length - 1) {
                    nextWord();
                }
            }, 800);
        }

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById(tab + 'Section').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Filter words
        function filterWords(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderWordList();
        }

        function renderWordList() {
            const list = document.getElementById('wordList');
            let filteredWords = words;

            if (currentFilter === 'learning') {
                filteredWords = words.filter(w => !w.learned);
            } else if (currentFilter === 'learned') {
                filteredWords = words.filter(w => w.learned);
            }

            list.innerHTML = filteredWords.map((word, index) => `
                <div class="word-item ${word.learned ? 'learned' : ''} animate-in" style="animation-delay: ${index * 0.05}s">
                    <div class="word-number">${index + 1}</div>
                    <div class="word-info">
                        <div class="word-name">${word.word} ${word.phonetic}</div>
                        <div class="word-meaning-item">${word.pos} ${word.meaning}</div>
                    </div>
                    <div class="word-status ${word.learned ? 'learned' : 'pending'}">
                        ${word.learned ? '✓' : '○'}
                    </div>
                </div>
            `).join('');
        }

        // Quiz functions
        function renderQuiz() {
            const word = words[quizIndex];
            document.getElementById('quizQuestion').textContent = word.word + ' 的意思是？';

            // Generate options (correct answer + 3 wrong answers)
            const wrongAnswers = words
                .filter(w => w.word !== word.word)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3)
                .map(w => w.meaning);

            const options = [word.meaning, ...wrongAnswers].sort(() => Math.random() - 0.5);

            document.getElementById('quizOptions').innerHTML = options.map(opt => `
                <div class="quiz-option" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</div>
            `).join('');

            // Update progress dots
            const dots = document.querySelectorAll('.quiz-dot');
            dots.forEach((dot, i) => {
                dot.className = 'quiz-dot';
                if (i < quizIndex) dot.classList.add('correct');
                if (i === quizIndex) dot.classList.add('active');
            });
        }

        function checkAnswer(element, answer) {
            const word = words[quizIndex];
            const options = document.querySelectorAll('.quiz-option');

            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.textContent === word.meaning) {
                    opt.classList.add('correct');
                }
            });

            if (answer === word.meaning) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
            }

            // Next question after delay
            setTimeout(() => {
                if (quizIndex < words.length - 1) {
                    quizIndex++;
                    renderQuiz();
                } else {
                    // Quiz completed
                    document.getElementById('quizQuestion').textContent = '🎉 测验完成！';
                    document.getElementById('quizOptions').innerHTML = `
                        <button class="btn btn-next" onclick="quizIndex = 0; renderQuiz();">重新开始</button>
                    `;
                }
            }, 1500);
        }
    </script>
</body>
</html>
